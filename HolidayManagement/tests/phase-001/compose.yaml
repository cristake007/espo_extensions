services:
  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: espocrm
      MARIADB_USER: espocrm
      MARIADB_PASSWORD: phase001-db
      MARIADB_ROOT_PASSWORD: phase001-root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - database:/var/lib/mysql

  espocrm:
    image: espocrm/espocrm:10.0.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      ESPOCRM_DATABASE_HOST: db
      ESPOCRM_DATABASE_NAME: espocrm
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: phase001-db
      ESPOCRM_ADMIN_USERNAME: admin
      ESPOCRM_ADMIN_PASSWORD: Phase001-Test-Password
      ESPOCRM_SITE_URL: http://localhost:18080
    healthcheck:
      test: ["CMD", "bin/command", "app-check"]
      start_period: 20s
      interval: 10s
      timeout: 10s
      retries: 30
    ports:
      - "18080:80"
    volumes:
      - data:/var/www/html/data
      - custom:/var/www/html/custom
      - custom-client:/var/www/html/client/custom

volumes:
  database:
  data:
  custom:
  custom-client:
